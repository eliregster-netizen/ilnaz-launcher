services:
  - type: web
    name: ilnaz-launcher
    env: node
    region: oregon
    plan: free
    buildCommand: npm ci
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "https://ilnaz-launcher.onrender.com,http://localhost:5173"